<!doctype html>
<html lang="en">
    <head>
      <meta charset="UTF-8" />
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="index.css" />
    </head>
    <body>
      <div class="top-container">
        <h1 id="hero-1">Generate a</h1>
        <h1 id="hero-2">random password</h1>
        <p id="sidekick">Never use an insecure password again</p>
        <button id="generate-btn" class = "btn-layout" onclick="genPwds()">Generate passwords</button>
      </div>
      <label for="use-nums-symbols-el-1" id="toggle-label" class="lighter-background">Toggle numbers and symbols on or off</label> 
      <button id="use-nums-symbols-el-1" class="btn-layout" onclick="toggleOn()">On</button>
      <button id="use-nums-symbols-el" class="btn-layout" onclick="toggleOff()">Off</button>
      <div id="pwd-length-container" class="container">
        <label for="set-pwd-length" class="lighter-background">Set password length</label>
        <input id="set-pwd-length-el" class="btn-layout input-layout" title="Set password length between 5 and 20 characters" 
          type="number" min="5" max="20" value="15" />
      </div>
      <div id="line-separator"></div>
      <div class="pwd-container">
        <p id="pwd-el-1" class="lighter-background"></p>
        <p id="pwd-el-2" class="lighter-background"></p>
      </div>
    </body>
    <script src="index.js"></script>
</html>
